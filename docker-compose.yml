services:
  db:
    image: postgres:16
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: capture
      POSTGRES_USER: postgres
    ports:
      - "127.0.0.1:55432:5432"

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres@db:5432/capture
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
    - ./data/images:/app/images