name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Hardware-independent only: there is no Kinect/projector on CI runners,
      # so we test the API, the fake-capture worker, and the pure fringe math.
      - name: Syntax check
        run: >
          python -m py_compile
          main.py db.py init_db.py capture_tool.py artifact_store.py
          fourdai_client.py
          fpp_tools/temporal_unwrap.py scripts/register_scan_folder.py
          examples/torres_fetch_scan_3d.py

      - name: Unit tests - fringe math and artifact files
        run: |
          python -m pip install --upgrade pip
          pip install numpy imageio requests
          python tests/test_fpp.py
          python tests/test_temporal_unwrap.py
          python tests/test_artifact_store.py
          python tests/test_register_scan_folder.py
          python tests/test_fourdai_client.py

      - name: Prepare host data dir
        # Create it as the runner user first, otherwise the docker bind mount
        # can make ./data root-owned and the host-side worker can't write.
        run: mkdir -p data/images data/ci_artifacts

      - name: Build and start API stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/docs >/dev/null; then
              echo "API is up"; exit 0
            fi
            sleep 2
          done
          echo "API did not come up in time"; docker compose logs; exit 1

      - name: Fake-capture smoke test (end to end through the DB)
        run: |
          pip install requests
          python capture_tool.py --steps 3

      - name: Artifact API smoke test
        run: |
          pip install requests numpy
          python tests/test_api_artifacts.py

      - name: Tear down
        if: always()
        run: |
          docker compose logs || true
          docker compose down -v || true
